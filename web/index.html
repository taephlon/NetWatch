<!DOCTYPE html>
<html>
<body>

<h1>NetWatch Live</h1>

<table id="connections" border="1">
    <thead>
        <tr>
            <th>PID</th>
            <th>Source IP</th>
            <th>Source Port</th>
            <th>Destination IP</th>
            <th>Destination Port</th>
            <th>State</th>
        </tr>
    </thead>

    <tbody>
    </tbody>
</table>

<script>
function tcpState(state) {
    switch (state) {
        case 1: return "ESTABLISHED";
        case 2: return "SYN_SENT";
        case 3: return "SYN_RECV";
        case 4: return "FIN_WAIT1";
        case 5: return "FIN_WAIT2";
        case 6: return "TIME_WAIT";
        case 7: return "CLOSE";
        case 8: return "CLOSE_WAIT";
        case 9: return "LAST_ACK";
        case 10: return "LISTEN";
        case 11: return "CLOSING";
        default: return state;
    }
}

const ws = new WebSocket("ws://localhost:3000/ws");

ws.onmessage = (event) => {
    const conn = JSON.parse(event.data);

    const row = document.createElement("tr");

    row.innerHTML = `
        <td>${conn.pid}</td>
        <td>${conn.src_ip}</td>
        <td>${conn.src_port}</td>
        <td>${conn.dst_ip}</td>
        <td>${conn.dst_port}</td>
        <td>${conn.old_state} &rarr; ${conn.new_state}</td>
    `;

    document
        .querySelector("#connections tbody")
        .prepend(row);
};
</script>

</body>
</html>
