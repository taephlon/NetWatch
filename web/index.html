<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>NetWatch Live Dashboard</title>

<style>
body {
    font-family: Arial, sans-serif;
    margin: 20px;
}

h1 {
    margin-bottom: 10px;
}

#status {
    margin-bottom: 10px;
    font-weight: bold;
}

#count {
    margin-bottom: 20px;
}

table {
    width: 100%;
    border-collapse: collapse;
}

th {
    background: #333;
    color: white;
}

th, td {
    padding: 8px;
    border: 1px solid #ddd;
    text-align: left;
}

tbody tr:nth-child(even) {
    background: #f4f4f4;
}

#alerts {
    margin-bottom: 20px;
}

.alert {
    padding: 10px;
    margin: 5px 0;
    border-left: 5px solid red;
    background: #ffe5e5;
    font-family: monospace;
}
</style>

</head>
<body>

<h1>NetWatch Live Dashboard</h1>

<div id="status">
    WebSocket: Connecting...
</div>

<div id="count">
    Connections: 0
</div>

<h2>Live Alerts</h2>

<div id="alerts"></div>

<hr>

<table>
    <thead>
        <tr>
            <th>PID</th>
            <th>Source IP</th>
            <th>Source Port</th>
            <th>Destination IP</th>
            <th>Process</th>
            <th>Executable</th>
            <th>Hostname</th>
            <th>Country</th>
            <th>City</th>
            <th>Destination Port</th>
            <th>State</th>
            <th>Threat</th>
            <th>Risk</th>
            <th>Level</th>
            <th>Timestamp</th>
        </tr>
    </thead>

    <tbody id="connections-body">
    </tbody>
</table>

<script>

const tbody =
    document.getElementById(
        "connections-body"
    );

const statusEl =
    document.getElementById(
        "status"
    );

const countEl =
    document.getElementById(
        "count"
    );

let totalConnections = 0;

function updateCounter() {
    countEl.textContent =
        `Connections: ${totalConnections}`;
}

function tcpState(state) {

    switch(state) {

        case 1:
            return "ESTABLISHED";

        case 2:
            return "SYN_SENT";

        case 3:
            return "SYN_RECV";

        case 4:
            return "FIN_WAIT1";

        case 5:
            return "FIN_WAIT2";

        case 6:
            return "TIME_WAIT";

        case 7:
            return "CLOSE";

        case 8:
            return "CLOSE_WAIT";

        case 9:
            return "LAST_ACK";

        case 10:
            return "LISTEN";

        case 11:
            return "CLOSING";

        default:
            return state;
    }
}

function threatColor(confidence) {

    if (confidence >= 90)
        return "#ff0000";

    if (confidence >= 70)
        return "#ff8800";

    return "#00ff00";
}

function addRow(conn) {

    const row =
        document.createElement("tr");

    const timestamp =
        conn.timestamp
        ? new Date(
            conn.timestamp * 1000
          ).toLocaleString()
        : "-";

    row.innerHTML = `
        <td>${conn.pid}</td>
        <td>${conn.src_ip}</td>
        <td>${conn.src_port}</td>
        <td>${conn.dst_ip}</td>
        <td>${conn.process_name}</td>
        <td>${conn.executable}</td>
        <td>${conn.hostname}</td>
        <td>${conn.country}</td>
        <td>${conn.city}</td>
        <td>${conn.dst_port}</td>
        <td>
            ${tcpState(conn.old_state)}
            →
            ${tcpState(conn.new_state)}
        </td>
        <td>${conn.risk_score}</td>
        <td>${conn.threat_label}</td>
        <td style="color:${threatColor(conn.threat_confidence)}">
    ${conn.threat_label}
  </td>
        <td>${timestamp}</td>
    `;

    tbody.prepend(row);

    totalConnections++;
    updateCounter();

    while (tbody.rows.length > 500) {
        tbody.deleteRow(
            tbody.rows.length - 1
        );
    }
}

async function loadHistory() {

    try {

        const response =
            await fetch(
                "/connections"
            );

        const data =
            await response.json();

        data.reverse();

        data.forEach(addRow);

    } catch (err) {

        console.error(
            "History load failed",
            err
        );
    }
}

function connectWebSocket() {

    statusEl.textContent =
        "WebSocket: Connecting...";

    const protocol =
        location.protocol === "https:"
        ? "wss:"
        : "ws:";

    const ws =
        new WebSocket(
            `${protocol}//${location.host}/ws`
        );

    ws.onopen = () => {

        statusEl.textContent =
            "WebSocket: Connected";
    };

    ws.onmessage = (event) => {

        try {

            const conn =
                JSON.parse(event.data
                );

          if (conn.risk_score >= 70) {

    const alert = document.createElement("div");

    alert.className = "alert";

    alert.innerHTML = `
        <strong>${conn.threat_label}</strong><br>
        ${conn.dst_ip}<br>
        Risk Score: ${conn.risk_score}
    `;

    document
        .getElementById("alerts")
        .prepend(alert);
}

            addRow(conn);

        } catch (err) {

            console.error(
                "Invalid message",
                err
            );
        }
    };

    ws.onclose = () => {

        statusEl.textContent =
            "WebSocket: Disconnected";

        setTimeout(
            connectWebSocket,
            2000
        );
    };

    ws.onerror = (err) => {

        console.error(
            "WebSocket error",
            err
        );

        ws.close();
    };
}

loadHistory();
connectWebSocket();

</script>

</body>
</html>
